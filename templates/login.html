<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录 - NAS Webhook</title>
    <style>
        body { background: #f4f6f9; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1e293b; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .error { color: #ef4444; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>NAS Webhook 登录</h3>
        {{if .error}}<div class="error">{{.error}}</div>{{end}}
        <form action="/login" method="POST">
            <input type="password" name="password" placeholder="请输入管理员密码" required autofocus>
            <button type="submit">进入控制台</button>
        </form>
        <p style="color:#cbd5e1; font-size:12px; margin-top:20px;">{{.version}}</p>
    </div>
</body>
</html>
